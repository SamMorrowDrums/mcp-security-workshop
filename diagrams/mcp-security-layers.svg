<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a855f7"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ef4444"/>
    </marker>
  </defs>
  <rect width="1200" height="900" fill="#0d1117"/>
  <text x="600" y="42" text-anchor="middle" fill="#ffffff" font-size="24" font-weight="bold" font-family="sans-serif">MCP Security Surface</text>
  <text x="600" y="65" text-anchor="middle" fill="#9ca3af" font-size="13" font-family="sans-serif">Data flows in. The model acts out. Trust breaks at every layer.</text>
  <rect x="30" y="80" width="1140" height="740" rx="24" fill="none" stroke="#a855f7" stroke-width="2" stroke-opacity="0.4"/>
  <text x="600" y="102" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="bold" font-family="sans-serif">DISCOVERY AND SUPPLY CHAIN</text>
  <rect x="80" y="112" width="130" height="42" rx="6" fill="#161b22" stroke="#6b7280" stroke-width="1"/>
  <text x="145" y="137" text-anchor="middle" fill="#e4e4e7" font-size="11" font-family="sans-serif">Manual install</text>
  <rect x="230" y="112" width="150" height="42" rx="6" fill="#161b22" stroke="#6b7280" stroke-width="1"/>
  <text x="305" y="137" text-anchor="middle" fill="#e4e4e7" font-size="11" font-family="sans-serif">Public registry</text>
  <rect x="400" y="112" width="170" height="42" rx="6" fill="#161b22" stroke="#6b7280" stroke-width="1"/>
  <text x="485" y="137" text-anchor="middle" fill="#e4e4e7" font-size="11" font-family="sans-serif">Curated / org registry</text>
  <rect x="590" y="112" width="130" height="42" rx="6" fill="#161b22" stroke="#6b7280" stroke-width="1"/>
  <text x="655" y="137" text-anchor="middle" fill="#e4e4e7" font-size="11" font-family="sans-serif">Org allowlists</text>
  <rect x="760" y="112" width="220" height="42" rx="6" fill="#161b22" stroke="#6b7280" stroke-width="1"/>
  <text x="870" y="131" text-anchor="middle" fill="#e4e4e7" font-size="11" font-family="sans-serif">SDKs - Libraries - Dependencies</text>
  <text x="870" y="146" text-anchor="middle" fill="#ef4444" font-size="10" font-style="italic" font-family="sans-serif">Dependency compromise - Phantom repos</text>
  <rect x="60" y="168" width="1080" height="620" rx="20" fill="none" stroke="#a855f7" stroke-width="2" stroke-opacity="0.5"/>
  <text x="600" y="188" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="bold" font-family="sans-serif">TRANSPORT AND AUTH</text>
  <rect x="85" y="198" width="280" height="90" rx="8" fill="#161b22" stroke="#a855f7" stroke-width="1.5"/>
  <text x="225" y="218" text-anchor="middle" fill="#a855f7" font-size="12" font-weight="bold" font-family="sans-serif">Local: STDIO</text>
  <text x="225" y="236" text-anchor="middle" fill="#e4e4e7" font-size="10" font-family="sans-serif">System user - PATs - env vars</text>
  <text x="225" y="254" text-anchor="middle" fill="#e4e4e7" font-size="10" font-family="sans-serif">Can auth via logged-in OS user</text>
  <text x="225" y="276" text-anchor="middle" fill="#ef4444" font-size="10" font-style="italic" font-family="sans-serif">Plaintext creds - World-readable config</text>
  <rect x="835" y="198" width="280" height="90" rx="8" fill="#161b22" stroke="#a855f7" stroke-width="1.5"/>
  <text x="975" y="218" text-anchor="middle" fill="#a855f7" font-size="12" font-weight="bold" font-family="sans-serif">Remote: HTTP</text>
  <text x="975" y="236" text-anchor="middle" fill="#e4e4e7" font-size="10" font-family="sans-serif">OAuth 2.1 - OIDC - Protected Resource Metadata</text>
  <text x="975" y="254" text-anchor="middle" fill="#e4e4e7" font-size="10" font-family="sans-serif">Servers request additional scopes mid-session</text>
  <text x="975" y="276" text-anchor="middle" fill="#ef4444" font-size="10" font-style="italic" font-family="sans-serif">DNS rebinding - SSRF - Token confusion</text>
  <rect x="90" y="302" width="1020" height="460" rx="16" fill="none" stroke="#22c55e" stroke-width="2" stroke-opacity="0.5"/>
  <text x="600" y="322" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="bold" font-family="sans-serif">MCP SERVERS</text>
  <rect x="115" y="334" width="230" height="72" rx="8" fill="#161b22" stroke="#22c55e" stroke-width="1.5"/>
  <text x="230" y="354" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="bold" font-family="sans-serif">Local Server</text>
  <text x="230" y="372" text-anchor="middle" fill="#e4e4e7" font-size="10" font-family="sans-serif">On your machine or in sandbox</text>
  <text x="230" y="392" text-anchor="middle" fill="#ef4444" font-size="10" font-style="italic" font-family="sans-serif">Arbitrary code execution - Local is not safe</text>
  <rect x="855" y="334" width="230" height="72" rx="8" fill="#161b22" stroke="#22c55e" stroke-width="1.5"/>
  <text x="970" y="354" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="bold" font-family="sans-serif">Remote Server</text>
  <text x="970" y="372" text-anchor="middle" fill="#e4e4e7" font-size="10" font-family="sans-serif">Connects to APIs - DBs - SaaS</text>
  <text x="970" y="392" text-anchor="middle" fill="#ef4444" font-size="10" font-style="italic" font-family="sans-serif">Vendor trust - Token forwarding</text>
  <rect x="120" y="420" width="960" height="130" rx="14" fill="none" stroke="#22c55e" stroke-width="2" stroke-opacity="0.6"/>
  <text x="600" y="440" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="bold" font-family="sans-serif">WHAT FLOWS BETWEEN MODEL AND SERVERS</text>
  <rect x="145" y="454" width="250" height="86" rx="8" fill="#161b22" stroke="#22c55e" stroke-width="1.5"/>
  <text x="270" y="474" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="bold" font-family="sans-serif">Into the model</text>
  <text x="270" y="492" text-anchor="middle" fill="#e4e4e7" font-size="10" font-family="sans-serif">Tool definitions - Prompts - Resources</text>
  <text x="270" y="508" text-anchor="middle" fill="#e4e4e7" font-size="10" font-family="sans-serif">Server instructions - Tool outputs</text>
  <text x="270" y="528" text-anchor="middle" fill="#ef4444" font-size="10" font-style="italic" font-family="sans-serif">Tool poisoning - Malicious metadata</text>
  <rect x="420" y="454" width="250" height="86" rx="8" fill="#161b22" stroke="#22c55e" stroke-width="1.5"/>
  <text x="545" y="474" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="bold" font-family="sans-serif">Dynamic</text>
  <text x="545" y="492" text-anchor="middle" fill="#e4e4e7" font-size="10" font-family="sans-serif">Tool lists change after approval</text>
  <text x="545" y="508" text-anchor="middle" fill="#e4e4e7" font-size="10" font-family="sans-serif">Persistent sessions - Sampling - Elicitation</text>
  <text x="545" y="528" text-anchor="middle" fill="#ef4444" font-size="10" font-style="italic" font-family="sans-serif">Rug pulls - State manipulation</text>
  <rect x="695" y="454" width="260" height="86" rx="8" fill="#161b22" stroke="#ef4444" stroke-width="2"/>
  <text x="825" y="474" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="bold" font-family="sans-serif">Out from the model</text>
  <text x="825" y="492" text-anchor="middle" fill="#e4e4e7" font-size="10" font-family="sans-serif">Tool calls with arguments</text>
  <text x="825" y="508" text-anchor="middle" fill="#e4e4e7" font-size="10" font-family="sans-serif">File writes - API requests - Code execution</text>
  <text x="825" y="528" text-anchor="middle" fill="#ef4444" font-size="10" font-style="italic" font-family="sans-serif">Exfiltration - Destructive actions</text>
  <rect x="190" y="570" width="720" height="80" rx="12" fill="none" stroke="#a855f7" stroke-width="2" stroke-opacity="0.6"/>
  <text x="550" y="590" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="bold" font-family="sans-serif">HOST / CLIENT</text>
  <text x="370" y="610" text-anchor="middle" fill="#e4e4e7" font-size="10" font-family="sans-serif">Claude Desktop - VS Code - Cursor - Custom agents</text>
  <text x="700" y="610" text-anchor="middle" fill="#e4e4e7" font-size="10" font-family="sans-serif">CLI tools - local or sandboxed</text>
  <text x="380" y="634" text-anchor="middle" fill="#e4e4e7" font-size="10" font-family="sans-serif">Human-in-the-loop approval</text>
  <text x="700" y="634" text-anchor="middle" fill="#ef4444" font-size="10" font-style="italic" font-family="sans-serif">ANSI deception hides content from humans</text>
  <rect x="300" y="666" width="500" height="58" rx="12" fill="#1a0a2e" stroke="#a855f7" stroke-width="3" filter="url(#glow)"/>
  <text x="550" y="690" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="bold" font-family="sans-serif">LLM Context Window</text>
  <text x="550" y="710" text-anchor="middle" fill="#c4b5fd" font-size="11" font-family="sans-serif">Cannot distinguish trusted from untrusted - Every connected server is a potential hand</text>
  <line x1="225" y1="158" x2="225" y2="194" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <line x1="975" y1="158" x2="975" y2="194" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <line x1="225" y1="292" x2="225" y2="330" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <line x1="975" y1="292" x2="975" y2="330" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <rect x="140" y="746" width="920" height="60" rx="10" fill="#1c0a0a" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="600" y="766" text-anchor="middle" fill="#ef4444" font-size="13" font-weight="bold" font-family="sans-serif">MULTI-SERVER COMPOSITION - cross-cutting risk</text>
  <text x="600" y="784" text-anchor="middle" fill="#e4e4e7" font-size="11" font-family="sans-serif">A poisoned server can trick the model into using a trusted server to exfiltrate, execute, or destroy</text>
  <text x="600" y="800" text-anchor="middle" fill="#fca5a5" font-size="10" font-style="italic" font-family="sans-serif">The blast radius is every tool the model can reach</text>
  <line x1="400" y1="744" x2="360" y2="726" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>
  <line x1="700" y1="744" x2="740" y2="726" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>
</svg>